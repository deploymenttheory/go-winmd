name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      # Tests fetch the pinned Windows.Win32.winmd fixture on first use
      # (sha256-verified against testdata/PROVENANCE.json).
      - name: Test
        run: go test ./...
